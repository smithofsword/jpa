<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients Directory</title>
    <style>
        :root {
            --paper: #f4efe5;
            --ink: #1f2a24;
            --forest: #23483a;
            --moss: #6d8f5f;
            --clay: #c46b43;
            --cream: #fffaf0;
            --line: rgba(31, 42, 36, 0.16);
            --shadow: 0 24px 70px rgba(31, 42, 36, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: "Trebuchet MS", Verdana, sans-serif;
            background:
                radial-gradient(circle at 12% 18%, rgba(196, 107, 67, 0.24), transparent 28%),
                radial-gradient(circle at 86% 12%, rgba(109, 143, 95, 0.42), transparent 30%),
                linear-gradient(145deg, #f8f0df 0%, #d9c9aa 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(31, 42, 36, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31, 42, 36, 0.04) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(to bottom, black, transparent 78%);
        }

        main {
            width: min(1120px, calc(100% - 36px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 22px;
            align-items: stretch;
            margin-bottom: 22px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 30px;
            background: rgba(255, 250, 240, 0.82);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .headline {
            padding: 34px;
            overflow: hidden;
            position: relative;
        }

        .headline::after {
            content: "";
            position: absolute;
            width: 210px;
            height: 210px;
            right: -72px;
            bottom: -92px;
            border-radius: 999px;
            background: var(--moss);
            opacity: 0.32;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: var(--clay);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 620px;
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(46px, 8vw, 86px);
            line-height: 0.9;
            letter-spacing: -0.06em;
        }

        .headline p {
            max-width: 54ch;
            margin: 24px 0 0;
            font-size: 17px;
            line-height: 1.65;
        }

        .tools {
            padding: 28px;
            display: grid;
            align-content: space-between;
            gap: 20px;
        }

        .status {
            min-height: 82px;
            border-radius: 22px;
            padding: 18px;
            color: var(--cream);
            background: var(--forest);
            font: 15px/1.55 Consolas, "Courier New", monospace;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button,
        a.button {
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            color: white;
            background: var(--clay);
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: transform 160ms ease, background 160ms ease;
        }

        button:hover,
        a.button:hover {
            transform: translateY(-2px);
            background: var(--forest);
        }

        .table-card {
            padding: 18px;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.45);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid var(--line);
        }

        th {
            color: var(--forest);
            background: rgba(109, 143, 95, 0.16);
            font-size: 12px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .patient-id {
            width: 90px;
            font-weight: 800;
            color: var(--clay);
        }

        .empty {
            padding: 28px;
            text-align: center;
            color: rgba(31, 42, 36, 0.72);
        }

        @media (max-width: 760px) {
            main {
                width: min(100% - 24px, 1120px);
                padding: 24px 0;
            }

            .hero {
                grid-template-columns: 1fr;
            }

            .headline,
            .tools {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="hero">
        <div class="card headline">
            <p class="eyebrow">JPA Projection Demo</p>
            <h1>Patients Directory</h1>
            <p>
                This page calls <strong>/patients</strong> and displays only the fields from
                <strong>IPatientInfo</strong>: id, name, and email.
            </p>
        </div>

        <div class="card tools">
            <div class="status" id="status">Loading patients from /patients ...</div>
            <div class="actions">
                <button type="button" id="refreshButton">Refresh Patients</button>
                <a class="button" href="/">Back Home</a>
            </div>
        </div>
    </section>

    <section class="card table-card">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
                </thead>
                <tbody id="patientsBody">
                <tr>
                    <td class="empty" colspan="3">No patient data loaded yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const statusBox = document.querySelector("#status");
    const patientsBody = document.querySelector("#patientsBody");
    const refreshButton = document.querySelector("#refreshButton");

    function setStatus(message) {
        statusBox.textContent = message;
    }

    function renderPatients(patients) {
        if (!patients.length) {
            patientsBody.innerHTML = '<tr><td class="empty" colspan="3">No patients found.</td></tr>';
            return;
        }

        patientsBody.innerHTML = patients.map((patient) => `
            <tr>
                <td class="patient-id">#${patient.id}</td>
                <td>${patient.name ?? "Unknown"}</td>
                <td>${patient.email ?? "No email"}</td>
            </tr>
        `).join("");
    }

    async function loadPatients() {
        setStatus("Loading patients from /patients ...");

        try {
            const response = await fetch("/patients");

            if (!response.ok) {
                throw new Error(`Request failed with status ${response.status}`);
            }

            const patients = await response.json();
            renderPatients(patients);
            setStatus(`Loaded ${patients.length} patients from the IPatientInfo projection.`);
        } catch (error) {
            patientsBody.innerHTML = '<tr><td class="empty" colspan="3">Could not load patients.</td></tr>';
            setStatus(`Request failed: ${error.message}`);
        }
    }

    refreshButton.addEventListener("click", loadPatients);
    loadPatients();
</script>
</body>
</html>
